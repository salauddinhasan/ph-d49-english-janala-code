<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>English Janala</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- DaisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.css"
      rel="stylesheet"
      type="text/css"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <!-- font family -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Poppins", sans-serif;
        font-family: "Hind Siliguri", sans-serif;
      }
    </style>
  </head>
  <body>
    <!-- header section -->
    <header>
      <!-- container -->
      <div class="max-w-screen-xl mx-auto">
        <!-- navbar -->
        <div class="navbar bg-base-100 shadow-sm">
          <div class="navbar-start">
            <div class="dropdown">
              <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="h-5 w-5"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M4 6h16M4 12h8m-8 6h16"
                  />
                </svg>
              </div>
              <ul
                tabindex="-1"
                class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow gap-2"
              >
                <li>
                  <a href="" class=" ">
                    <i class="fa-solid fa-circle-question"></i>
                    FAQ</a
                  >
                </li>
                <li>
                  <a href="" class=" ">
                    <i class="fa-solid fa-book-open"></i>
                    Learn</a
                  >
                </li>
                <li>
                  <a href="" class=" ">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    Logout</a
                  >
                </li>
              </ul>
            </div>
            <a href="/" class="flex items-center gap-1">
              <span class="text-lg font-bold">English</span>
              <img src="assets/logo.png" alt="logo" />
              <span class="text-lg font-semibold">জানালা</span>
            </a>
          </div>
          <div class="navbar-end hidden lg:flex">
            <ul class="menu menu-horizontal px-1 gap-2">
              <li>
                <a href="" class="btn btn-outline btn-primary">
                  <i class="fa-solid fa-circle-question"></i>
                  FAQ</a
                >
              </li>
              <li>
                <a href="" class="btn btn-outline btn-primary">
                  <i class="fa-solid fa-book-open"></i>
                  Learn</a
                >
              </li>
              <li>
                <a href="" class="btn btn-outline btn-primary">
                  <i class="fa-solid fa-arrow-right-from-bracket"></i>
                  Logout</a
                >
              </li>
            </ul>
          </div>
        </div>
      </div>
    </header>

    <!-- hero section -->
    <section class="hero-section py-5">
      <!-- container -->
      <div class="max-w-screen-xl mx-auto p-3">
        <!-- hero container -->
        <div class="hero-container grid grid-cols-1 md:grid-cols-2 gap-2 items-center">

          <!-- hero content -->
          <div class="order-2 md:order-1 space-y-4 text-center md:text-left">
             <h1 class="text-2xl md:text-3xl font-bold text-black"><span class="text-blue-400">English </span> is Easy!!</h1>
             <p class="text-base font-medium md:max-w-[480px] w-full items-center">আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা আপনার দক্ষতা বাড়াতে চান, আমাদের Interactive Lessons আপনাকে নিয়ে যাবে অন্য একটি Level এ</p>

             <form class="space-y-3" >
              <input class="p-3 rounded-lg bg-blue-50 md:w-1/2 w-full" type="text" name="name" id="name" placeholder="Enter Your Name" autocomplete="off"> <br>

              <input class="p-3 rounded-lg bg-blue-50 md:w-1/2 w-full" type="password" name="pin" id="pin" placeholder="********" autocomplete="new-password"> <br>

               
              <button class="btn btn-active btn-primary w-[200px]">Primary</button>

             </form>
          </div>

          <!-- hero images -->
          <div class="order-1 md:order-2">
             <img src="assets/hero-student.png" alt="" class="w-full max-w-sm mx-auto">
          </div>
        </div>
      </div>
    </section>

    <!-- vocabulary section -->
    <section class="vocabulary-section">
      <!-- container -->
      <div class="max-w-screen-xl mx-auto p-3">

         <h1 class="text-2xl md:text-4xl font-bold text-center text-black"><span class="text-blue-400">Let's </span>Learn Vocabularies</h1>

         <div id="level-container" class="flex gap-5 flex-wrap justify-center"></div>
        
      </div>
    </section>

    <script src="index.js"></script>
  </body>
</html>
